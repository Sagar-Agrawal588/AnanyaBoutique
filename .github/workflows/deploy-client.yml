name: Deploy Client (Firebase App Hosting)

on:
  push:
    branches:
      - main
      - master
    paths:
      - "frontend/client/**"
      - ".github/workflows/deploy-client.yml"
  workflow_dispatch:

permissions:
  contents: read
  checks: read
  actions: read

concurrency:
  group: deploy-client
  cancel-in-progress: true

env:
  FIREBASE_APP_HOSTING_BACKEND: healthyonegram-client
  FIREBASE_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Await required CI checks
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node scripts/await-required-checks.mjs \
            --check "Validate Env Examples" \
            --check "Backend Tests" \
            --check "Client Build" \
            --check "Admin Build"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@15.18.0

      - name: Validate Firebase App Hosting backend
        run: |
          test -n "$FIREBASE_PROJECT_ID"
          firebase apphosting:backends:get "$FIREBASE_APP_HOSTING_BACKEND" \
            --project "$FIREBASE_PROJECT_ID" \
            --non-interactive

      - name: Validate production API config
        run: |
          grep -q "healthyonegram-api-v2" frontend/client/apphosting.yaml
          ! grep -E "localhost|127\.0\.0\.1|healthyonegram-backend" frontend/client/apphosting.yaml

      - name: Create Firebase App Hosting rollout
        run: |
          firebase apphosting:rollouts:create "$FIREBASE_APP_HOSTING_BACKEND" \
            --git-branch "${GITHUB_REF_NAME}" \
            --force \
            --project "$FIREBASE_PROJECT_ID" \
            --non-interactive
