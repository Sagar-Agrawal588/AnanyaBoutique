name: Deploy Client (Firebase App Hosting)

on:
  push:
    branches:
      - main
      - master
    paths:
      - "frontend/client/**"
      - "scripts/await-required-checks.mjs"
      - ".github/workflows/deploy-client.yml"
  workflow_dispatch:

permissions:
  contents: read
  checks: read
  actions: read

concurrency:
  group: deploy-client
  cancel-in-progress: true

env:
  FIREBASE_APP_HOSTING_BACKEND: ananyaboutique-client
  FIREBASE_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  FIREBASE_LOCATION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
      NEXT_PUBLIC_FIREBASE_VAPID_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_VAPID_KEY }}
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Await required CI checks
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node scripts/await-required-checks.mjs \
            --check "Validate Env Examples" \
            --check "Backend Tests" \
            --check "Client Build" \
            --check "Admin Build"

      - name: Detect Firebase credentials
        id: firebase_credentials
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -n "$GCP_SA_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Firebase App Hosting credentials are configured."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Firebase App Hosting rollout because GCP_SA_KEY is not configured. Vercel remains the production client deployment target."
          fi

      - name: Authenticate to Google Cloud
        if: steps.firebase_credentials.outputs.available == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Node
        if: steps.firebase_credentials.outputs.available == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        if: steps.firebase_credentials.outputs.available == 'true'
        run: npm install -g firebase-tools@15.18.0

      - name: Validate Firebase App Hosting backend
        if: steps.firebase_credentials.outputs.available == 'true'
        run: |
          test -n "$FIREBASE_PROJECT_ID"
          firebase apphosting:backends:get "$FIREBASE_APP_HOSTING_BACKEND" \
            --project "$FIREBASE_PROJECT_ID" \
            --non-interactive

      - name: Validate production API config
        if: steps.firebase_credentials.outputs.available == 'true'
        run: |
          grep -q "ananyaboutique-api" frontend/client/apphosting.yaml
          ! grep -E "localhost|127\.0\.0\.1|ananyaboutique-backend" frontend/client/apphosting.yaml

      - name: Sync App Hosting secrets
        if: steps.firebase_credentials.outputs.available == 'true'
        run: |
          set -euo pipefail

          sync_secret() {
            local key="$1"
            local value="$2"
            test -n "$value"
            printf '%s' "$value" | firebase apphosting:secrets:set "$key" \
              --project "$FIREBASE_PROJECT_ID" \
              --location "$FIREBASE_LOCATION" \
              --data-file _ \
              --non-interactive
            firebase apphosting:secrets:grantaccess "$key" "$FIREBASE_APP_HOSTING_BACKEND" \
              --project "$FIREBASE_PROJECT_ID" \
              --location "$FIREBASE_LOCATION" \
              --non-interactive
          }

          sync_secret "NEXT_PUBLIC_FIREBASE_API_KEY" "$NEXT_PUBLIC_FIREBASE_API_KEY"
          sync_secret "NEXT_PUBLIC_FIREBASE_APP_ID" "$NEXT_PUBLIC_FIREBASE_APP_ID"
          sync_secret "NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID" "$NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID"
          sync_secret "NEXT_PUBLIC_FIREBASE_VAPID_KEY" "$NEXT_PUBLIC_FIREBASE_VAPID_KEY"
          sync_secret "NEXT_PUBLIC_GOOGLE_MAPS_API_KEY" "$NEXT_PUBLIC_GOOGLE_MAPS_API_KEY"

      - name: Create Firebase App Hosting rollout
        if: steps.firebase_credentials.outputs.available == 'true'
        run: |
          firebase apphosting:rollouts:create "$FIREBASE_APP_HOSTING_BACKEND" \
            --git-branch "${GITHUB_REF_NAME}" \
            --force \
            --project "$FIREBASE_PROJECT_ID" \
            --non-interactive
