name: Deploy Backend (Cloud Run)

on:
  push:
    branches:
      - main
      - master
    paths:
      - "server/**"
      - "frontend/admin/src/app/crm/**"
      - "frontend/admin/src/services/crmApi.js"
      - "frontend/admin/src/utils/api.js"
      - "frontend/admin/src/utils/realtime.js"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

permissions:
  contents: read
  checks: read
  actions: read

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Await required CI checks
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node scripts/await-required-checks.mjs \
            --check "Validate Env Examples" \
            --check "Backend Tests" \
            --check "Client Build" \
            --check "Admin Build"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Validate Cloud Run target project
        env:
          CLOUD_RUN_SERVICE: ${{ secrets.CLOUD_RUN_BACKEND_SERVICE }}
          CLOUD_RUN_REGION: ${{ secrets.CLOUD_RUN_REGION }}
        run: |
          service="${CLOUD_RUN_SERVICE:-healthyonegram-api-v2}"
          region="$(printf '%s' "${CLOUD_RUN_REGION:-us-central1}" | tr -d '\r\n' | xargs)"
          if [ -z "$region" ]; then
            region="us-central1"
          fi
          gcloud run services describe "$service" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --region="$region" \
            --format="value(metadata.name)" | grep -qx "$service"
          echo "Validated Cloud Run service: $service in $region"

      - name: Build temporary backend env file
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
          CLIENT_URL: ${{ secrets.CLIENT_URL }}
          ADMIN_URL: ${{ secrets.ADMIN_URL }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM_NAME: ${{ secrets.EMAIL_FROM_NAME }}
          EMAIL_FROM_ADDRESS: ${{ secrets.EMAIL_FROM_ADDRESS }}
          EMAIL: ${{ secrets.EMAIL }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SUPPORT_ADMIN_EMAIL: ${{ secrets.SUPPORT_ADMIN_EMAIL }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          MEDIA_STORAGE_PROVIDER: ${{ secrets.MEDIA_STORAGE_PROVIDER }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          GCS_MEDIA_BUCKET: ${{ secrets.GCS_MEDIA_BUCKET }}
          GCS_MEDIA_PUBLIC_BASE_URL: ${{ secrets.GCS_MEDIA_PUBLIC_BASE_URL }}
          GCS_MEDIA_MAKE_PUBLIC: ${{ secrets.GCS_MEDIA_MAKE_PUBLIC }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WHATSAPP_APP_ID: ${{ secrets.WHATSAPP_APP_ID }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WHATSAPP_BUSINESS_ACCOUNT_ID: ${{ secrets.WHATSAPP_BUSINESS_ACCOUNT_ID }}
          WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${{ secrets.WHATSAPP_WEBHOOK_VERIFY_TOKEN }}
          WHATSAPP_APP_SECRET: ${{ secrets.WHATSAPP_APP_SECRET }}
          WHATSAPP_GRAPH_API_VERSION: ${{ secrets.WHATSAPP_GRAPH_API_VERSION }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PAYMENT_PROVIDER: ${{ secrets.PAYMENT_PROVIDER }}
          PAYTM_ENABLED: ${{ secrets.PAYTM_ENABLED }}
          PAYTM_MERCHANT_ID: ${{ secrets.PAYTM_MERCHANT_ID }}
          PAYTM_MERCHANT_KEY: ${{ secrets.PAYTM_MERCHANT_KEY }}
          PAYTM_ENV: ${{ secrets.PAYTM_ENV }}
          PAYTM_WEBSITE: ${{ secrets.PAYTM_WEBSITE }}
          PAYTM_CHANNEL_ID_WEB: ${{ secrets.PAYTM_CHANNEL_ID_WEB }}
          PAYTM_BASE_URL: ${{ secrets.PAYTM_BASE_URL }}
          PAYTM_ORDER_CALLBACK_URL: ${{ secrets.PAYTM_ORDER_CALLBACK_URL }}
          PAYTM_MEMBERSHIP_CALLBACK_URL: ${{ secrets.PAYTM_MEMBERSHIP_CALLBACK_URL }}
          PHONEPE_ENABLED: ${{ secrets.PHONEPE_ENABLED }}
          PHONEPE_CLIENT_ID: ${{ secrets.PHONEPE_CLIENT_ID }}
          PHONEPE_CLIENT_SECRET: ${{ secrets.PHONEPE_CLIENT_SECRET }}
          PHONEPE_CLIENT_VERSION: ${{ secrets.PHONEPE_CLIENT_VERSION }}
          PHONEPE_ENV: ${{ secrets.PHONEPE_ENV }}
          PHONEPE_BASE_URL: ${{ secrets.PHONEPE_BASE_URL }}
          PHONEPE_ORDER_CALLBACK_URL: ${{ secrets.PHONEPE_ORDER_CALLBACK_URL }}
          PHONEPE_REDIRECT_URL: ${{ secrets.PHONEPE_REDIRECT_URL }}
          XPRESSBEES_TOKEN: ${{ secrets.XPRESSBEES_TOKEN }}
          XPRESSBEES_EMAIL: ${{ secrets.XPRESSBEES_EMAIL }}
          XPRESSBEES_PASSWORD: ${{ secrets.XPRESSBEES_PASSWORD }}
          XPRESSBEES_BASE_URL: ${{ secrets.XPRESSBEES_BASE_URL }}
          XPRESSBEES_TOKEN_TTL_MINUTES: ${{ secrets.XPRESSBEES_TOKEN_TTL_MINUTES }}
          XPRESSBEES_PACKAGE_WEIGHT_UNIT: ${{ secrets.XPRESSBEES_PACKAGE_WEIGHT_UNIT }}
          XPRESSBEES_WEBHOOK_SECRET: ${{ secrets.XPRESSBEES_WEBHOOK_SECRET }}
          XPRESSBEES_POLL_ENABLED: ${{ secrets.XPRESSBEES_POLL_ENABLED }}
          XPRESSBEES_POLL_INTERVAL_MINUTES: ${{ secrets.XPRESSBEES_POLL_INTERVAL_MINUTES }}
          XPRESSBEES_POLL_BATCH_SIZE: ${{ secrets.XPRESSBEES_POLL_BATCH_SIZE }}
          XPRESSBEES_ORIGIN_PINCODE: ${{ secrets.XPRESSBEES_ORIGIN_PINCODE }}
          XPRESSBEES_PICKUP_WAREHOUSE: ${{ secrets.XPRESSBEES_PICKUP_WAREHOUSE }}
          XPRESSBEES_PICKUP_NAME: ${{ secrets.XPRESSBEES_PICKUP_NAME }}
          XPRESSBEES_PICKUP_ADDRESS1: ${{ secrets.XPRESSBEES_PICKUP_ADDRESS1 }}
          XPRESSBEES_PICKUP_ADDRESS2: ${{ secrets.XPRESSBEES_PICKUP_ADDRESS2 }}
          XPRESSBEES_PICKUP_CITY: ${{ secrets.XPRESSBEES_PICKUP_CITY }}
          XPRESSBEES_PICKUP_STATE: ${{ secrets.XPRESSBEES_PICKUP_STATE }}
          XPRESSBEES_PICKUP_PINCODE: ${{ secrets.XPRESSBEES_PICKUP_PINCODE }}
          XPRESSBEES_PICKUP_PHONE: ${{ secrets.XPRESSBEES_PICKUP_PHONE }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          required = [
              "MONGO_URI",
              "ACCESS_TOKEN_SECRET",
              "REFRESH_TOKEN_SECRET",
              "SITE_URL",
              "CLIENT_URL",
              "ADMIN_URL",
              "CORS_ORIGINS",
          ]
          missing = [key for key in required if not os.environ.get(key)]
          if missing:
              sys.exit(
                  "Missing required GitHub repository secrets: "
                  + ", ".join(missing)
              )

          grouped_optional = {
              "SMTP Email (modern)": [
                  "SMTP_USER",
                  "SMTP_PASS",
              ],
              "SMTP Email (legacy)": [
                  "EMAIL",
                  "EMAIL_PASSWORD",
              ],
              "Cloudinary": [
                  "CLOUDINARY_CLOUD_NAME",
                  "CLOUDINARY_API_KEY",
                  "CLOUDINARY_API_SECRET",
              ],
                "Firebase Admin": [
                  "FIREBASE_PROJECT_ID",
                  "FIREBASE_CLIENT_EMAIL",
                  "FIREBASE_PRIVATE_KEY",
                ],
                "Paytm Credentials": [
                  "PAYTM_MERCHANT_ID",
                  "PAYTM_MERCHANT_KEY",
              ],
              "PhonePe Credentials": [
                  "PHONEPE_CLIENT_ID",
                  "PHONEPE_CLIENT_SECRET",
              ],
              "Xpressbees Login": [
                  "XPRESSBEES_EMAIL",
                  "XPRESSBEES_PASSWORD",
              ],
          }
          for group_name, keys in grouped_optional.items():
              provided = [k for k in keys if os.environ.get(k, "").strip()]
              if 0 < len(provided) < len(keys):
                  sys.exit(
                      f"Partial {group_name} secrets detected. "
                      f"Provide all or none: {', '.join(keys)}"
                  )

          env_values = {
              "NODE_ENV": "production",
              "MONGO_URI": os.environ["MONGO_URI"],
              "ACCESS_TOKEN_SECRET": os.environ["ACCESS_TOKEN_SECRET"],
              "REFRESH_TOKEN_SECRET": os.environ["REFRESH_TOKEN_SECRET"],
              "SITE_URL": os.environ["SITE_URL"],
              "CLIENT_URL": os.environ["CLIENT_URL"],
              "ADMIN_URL": os.environ["ADMIN_URL"],
              "CORS_ORIGINS": os.environ["CORS_ORIGINS"],
          }

          optional = [
              "SMTP_HOST",
              "SMTP_PORT",
              "SMTP_SECURE",
              "SMTP_USER",
              "SMTP_PASS",
              "EMAIL_FROM_NAME",
              "EMAIL_FROM_ADDRESS",
              "EMAIL",
              "EMAIL_PASSWORD",
              "SUPPORT_ADMIN_EMAIL",
              "CLOUDINARY_CLOUD_NAME",
              "CLOUDINARY_API_KEY",
              "CLOUDINARY_API_SECRET",
              "MEDIA_STORAGE_PROVIDER",
              "FIREBASE_STORAGE_BUCKET",
              "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET",
              "GCS_MEDIA_BUCKET",
              "GCS_MEDIA_PUBLIC_BASE_URL",
              "GCS_MEDIA_MAKE_PUBLIC",
              "FIREBASE_PROJECT_ID",
              "FIREBASE_CLIENT_EMAIL",
              "FIREBASE_PRIVATE_KEY",
              "WHATSAPP_ACCESS_TOKEN",
              "WHATSAPP_APP_ID",
              "WHATSAPP_PHONE_NUMBER_ID",
              "WHATSAPP_BUSINESS_ACCOUNT_ID",
              "WHATSAPP_WEBHOOK_VERIFY_TOKEN",
              "WHATSAPP_APP_SECRET",
              "WHATSAPP_GRAPH_API_VERSION",
              "BACKEND_URL",
              "API_BASE_URL",
              "PAYMENT_PROVIDER",
              "PAYTM_ENABLED",
              "PAYTM_MERCHANT_ID",
              "PAYTM_MERCHANT_KEY",
              "PAYTM_ENV",
              "PAYTM_WEBSITE",
              "PAYTM_CHANNEL_ID_WEB",
              "PAYTM_BASE_URL",
              "PAYTM_ORDER_CALLBACK_URL",
              "PAYTM_MEMBERSHIP_CALLBACK_URL",
              "PHONEPE_ENABLED",
              "PHONEPE_CLIENT_ID",
              "PHONEPE_CLIENT_SECRET",
              "PHONEPE_CLIENT_VERSION",
              "PHONEPE_ENV",
              "PHONEPE_BASE_URL",
              "PHONEPE_ORDER_CALLBACK_URL",
              "PHONEPE_REDIRECT_URL",
              "XPRESSBEES_TOKEN",
              "XPRESSBEES_EMAIL",
              "XPRESSBEES_PASSWORD",
              "XPRESSBEES_BASE_URL",
              "XPRESSBEES_TOKEN_TTL_MINUTES",
              "XPRESSBEES_PACKAGE_WEIGHT_UNIT",
              "XPRESSBEES_WEBHOOK_SECRET",
              "XPRESSBEES_POLL_ENABLED",
              "XPRESSBEES_POLL_INTERVAL_MINUTES",
              "XPRESSBEES_POLL_BATCH_SIZE",
              "XPRESSBEES_ORIGIN_PINCODE",
              "XPRESSBEES_PICKUP_WAREHOUSE",
              "XPRESSBEES_PICKUP_NAME",
              "XPRESSBEES_PICKUP_ADDRESS1",
              "XPRESSBEES_PICKUP_ADDRESS2",
              "XPRESSBEES_PICKUP_CITY",
              "XPRESSBEES_PICKUP_STATE",
              "XPRESSBEES_PICKUP_PINCODE",
              "XPRESSBEES_PICKUP_PHONE",
          ]
          for key in optional:
              value = os.environ.get(key, "")
              if value:
                  env_values[key] = value

          target = "server/cloudrun.env.yaml"
          with open(target, "w", encoding="utf-8") as env_file:
              for key, value in env_values.items():
                  serialized = json.dumps(str(value))
                  env_file.write(f"{key}: {serialized}\n")
          PY

      - name: Derive Cloud Run backend URL
        env:
          CLOUD_RUN_SERVICE: ${{ secrets.CLOUD_RUN_BACKEND_SERVICE }}
          CLOUD_RUN_REGION: ${{ secrets.CLOUD_RUN_REGION }}
        run: |
          service="${CLOUD_RUN_SERVICE:-healthyonegram-api-v2}"
          region="$(printf '%s' "${CLOUD_RUN_REGION:-us-central1}" | tr -d '\r\n' | xargs)"
          if [ -z "$region" ]; then
            region="us-central1"
          fi
          {
            echo "CLOUD_RUN_SERVICE_NAME=$service"
            echo "CLOUD_RUN_SERVICE_REGION=$region"
          } >> "$GITHUB_ENV"

      - name: Deploy backend service
        run: |
          gcloud run deploy "$CLOUD_RUN_SERVICE_NAME" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --region="$CLOUD_RUN_SERVICE_REGION" \
            --source=server \
            --allow-unauthenticated \
            --port=8080 \
            --env-vars-file=server/cloudrun.env.yaml \
            --quiet

      - name: Capture deployed backend URL
        run: |
          backend_url="$(gcloud run services describe "$CLOUD_RUN_SERVICE_NAME" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --region="$CLOUD_RUN_SERVICE_REGION" \
            --format='value(status.url)')"
          if [ -z "$backend_url" ]; then
            echo "Failed to resolve deployed Cloud Run backend URL"
            exit 1
          fi
          echo "DEPLOYED_BACKEND_URL=$backend_url" >> "$GITHUB_ENV"

      - name: Finalize backend runtime URLs
        run: |
          gcloud run services update "$CLOUD_RUN_SERVICE_NAME" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --region="$CLOUD_RUN_SERVICE_REGION" \
            --update-env-vars "BACKEND_URL=$DEPLOYED_BACKEND_URL,API_BASE_URL=$DEPLOYED_BACKEND_URL,PAYTM_ORDER_CALLBACK_URL=$DEPLOYED_BACKEND_URL/api/orders/webhook/paytm,PHONEPE_ORDER_CALLBACK_URL=$DEPLOYED_BACKEND_URL/api/orders/webhook/phonepe" \
            --quiet

      - name: Run production smoke checks
        env:
          BACKEND_SMOKE_URL: ${{ env.DEPLOYED_BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_SMOKE_URL" ]; then
            echo "Missing deployed backend URL for smoke checks"
            exit 1
          fi

          node scripts/production-smoke-check.mjs \
            --backend-url "$BACKEND_SMOKE_URL" \
            --origin "https://healthyonegram.com" \
            --origin "https://healthyonegram-client--studio-8452116634-cdb59.us-central1.hosted.app" \
            --origin "https://healthyonegram-admin--studio-8452116634-cdb59.us-central1.hosted.app"

      - name: Cleanup
        if: always()
        run: rm -f server/cloudrun.env.yaml
