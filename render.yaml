services:
  - type: web
    name: ananya-boutique-api
    runtime: node
    plan: free
    branch: main
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22
      - key: TRUST_PROXY_HOPS
        value: 1
      - key: SITE_URL
        value: https://ananyaboutique.com
      - key: CLIENT_URL
        value: https://ananyaboutique.com
      - key: ADMIN_URL
        value: https://ananyaboutique.com/admin
      - key: CORS_ORIGINS
        value: https://ananyaboutique.com,https://www.ananyaboutique.com,https://ananya-boutique-client.vercel.app,https://admin.ananyaboutique.com
      - key: BACKEND_URL
        value: https://ananya-boutique-api.onrender.com
      - key: API_BASE_URL
        value: https://ananya-boutique-api.onrender.com
      - key: MEDIA_STORAGE_PROVIDER
        value: cloudinary
      - key: PERF_SOCKET_PREFER_WEBSOCKET
        value: false
      - key: PERF_SOCKET_ALLOW_POLLING
        value: true
      - key: MONGO_URI
        sync: false
      - key: ACCESS_TOKEN_SECRET
        sync: false
      - key: REFRESH_TOKEN_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
