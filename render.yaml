services:
  - type: web
    name: ananya-boutique-api
    runtime: node
    plan: free
    branch: main
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22
      - key: TRUST_PROXY_HOPS
        value: 1
      - key: SITE_URL
        value: https://ananya-boutique-client.vercel.app
      - key: CLIENT_URL
        value: https://ananya-boutique-client.vercel.app
      - key: ADMIN_URL
        value: https://admin.ananyaboutique.com
      - key: CORS_ORIGINS
        value: https://ananya-boutique-client.vercel.app,https://ananyaboutique.com,https://www.ananyaboutique.com,https://admin.ananyaboutique.com
      - key: BACKEND_URL
        value: https://ananya-boutique-api.onrender.com
      - key: API_BASE_URL
        value: https://ananya-boutique-api.onrender.com
      - key: MEDIA_STORAGE_PROVIDER
        value: cloudinary
      - key: PERF_SOCKET_PREFER_WEBSOCKET
        value: false
      - key: PERF_SOCKET_ALLOW_POLLING
        value: true
      - key: MONGO_URI
        sync: false
      - key: ACCESS_TOKEN_SECRET
        sync: false
      - key: REFRESH_TOKEN_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM_NAME
        value: Ananya Boutique
      - key: EMAIL_FROM_ADDRESS
        sync: false
      - key: PAYMENT_PROVIDER
        sync: false
      - key: PAYTM_ENABLED
        value: false
      - key: PAYTM_MERCHANT_ID
        sync: false
      - key: PAYTM_MERCHANT_KEY
        sync: false
      - key: PAYTM_ENV
        sync: false
      - key: PAYTM_WEBSITE
        sync: false
      - key: PAYTM_CHANNEL_ID_WEB
        sync: false
      - key: PAYTM_BASE_URL
        sync: false
      - key: PAYTM_ORDER_CALLBACK_URL
        value: https://ananya-boutique-api.onrender.com/api/orders/webhook/paytm
      - key: PHONEPE_ENABLED
        value: false
      - key: PHONEPE_CLIENT_ID
        sync: false
      - key: PHONEPE_CLIENT_SECRET
        sync: false
      - key: PHONEPE_CLIENT_VERSION
        sync: false
      - key: PHONEPE_ENV
        sync: false
      - key: PHONEPE_BASE_URL
        sync: false
      - key: PHONEPE_ORDER_CALLBACK_URL
        value: https://ananya-boutique-api.onrender.com/api/orders/webhook/phonepe
      - key: PHONEPE_REDIRECT_URL
        value: https://ananya-boutique-client.vercel.app/payment/phonepe
